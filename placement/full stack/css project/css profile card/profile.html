<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>profile card</title>
    <link rel="stylesheet" href="profile.css">
</head>
<body>
    <div class="container">
        <div class="card">
         
            <a href="#" class="img-container">
            <img src="https://randomuser.me/api/portraits/men/1.jpg" alt="John Doe" class="img">
            </a>

                <div class="profile-details">
                    <h2 class="name">John Doe</h2>
                    <p class="designation">Senior Developer</p>
                </div>
                <p class="info">FullStack developer with 5Year+ experience working in mnc build project that get me hired.</p>
                <ul class="links">
                    <li class="link">Instagram</li>
                    <li class="link">Linkedin</li>
                    <li class="link">Twitter</li>
                </ul>
                <button class="btn">Hire Me</button>
        </div>
    </div>
</body>
</html>
