<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50">
    <div class="max-w-6xl mx-auto p-6">
        <!-- Header -->
        <h1 class="text-4xl font-bold mb-2 text-gray-800">Expense Tracker</h1>
        <p class="text-gray-600 mb-8">Track your spending efficiently</p>

        <!-- Main Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- LEFT: Form -->
            <div class="lg:col-span-1">
                <form id="expenseForm" class="bg-white p-6 rounded-lg shadow-md">
                    <h2 class="text-xl font-semibold mb-4 text-gray-800" >Add Expense</h2>
                    
                    <input 
                        type="text" 
                        id="description" 
                        placeholder="Description (e.g., Groceries)" 
                        class="w-full mb-3 p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
                        
                        required
                    >
                    
                    <input 
                        type="number" 
                        id="amount" 
                        placeholder="Amount" 
                        class="w-full mb-3 p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
                        min="0"
                        step="0.01"
                       
                        required
                    >
                    
                    <select 
                        id="category" 
                        class="w-full mb-3 p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
                        
                        required
                    >
                        <option value="" id="opt">Select Category</option>
                        <option value="food" id="opt">🍔 Food</option>
                        <option value="transport" id="opt">🚗 Transport</option>
                        <option value="entertainment" id="opt">🎬 Entertainment</option>
                        <option value="utilities" id="opt">💡 Utilities</option>
                        <option value="other" id="opt">📦 Other</option>
                    </select>
                    
                    <input 
                        type="date" 
                        id="date" 
                        class="w-full mb-4 p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
                        id="date"
                        required
                    >
                    
                    <button 
                        type="submit" 
                        class="w-full bg-blue-500 text-white p-3 rounded-lg font-semibold hover:bg-blue-600 transition" 
                        id="add_btn"
                    >
                        + Add Expense
                    </button>
                </form>
            </div>

            <!-- RIGHT: Display -->
            <div class="lg:col-span-2">
                
                <!-- Stats Card --> 
                <div class="bg-white p-6 rounded-lg shadow-md mb-6">
                    <p class="text-gray-600 mb-2">Total Expenses</p>
                    <p class="text-4xl font-bold text-blue-600">₹<span id="totalAmount">0</span></p>
                </div>

                <!-- Filter -->
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Filter by Category</label>
                    <select 
                        id="filterCategory" 
                        class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
                    >
                        <option value="">All Categories</option>
                        <option value="food">🍔 Food</option>
                        <option value="transport">🚗 Transport</option>
                        <option value="entertainment">🎬 Entertainment</option>
                        <option value="utilities">💡 Utilities</option>
                        <option value="other">📦 Other</option>
                    </select>
                </div>

                <!-- Transactions List -->
                <div class="bg-white rounded-lg shadow-md">
                    <div class="p-6 border-b border-gray-200">
                        <h2 class="text-xl font-semibold text-gray-800">Recent Transactions</h2>
                    </div>
                    <div id="transactionsList" class="divide-y divide-gray-200">
                        <!-- <p class="p-6 text-gray-500 text-center">No transactions yet</p> -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Chart Section -->
        <div class="mt-8 bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">Spending by Category</h2>
            <div style="position: relative; height: 350px; width: 100%;">
        <canvas id="expenseChart"></canvas>
    </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
